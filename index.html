<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdSpy — Pay-Per-Call Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090c;
  --s1: #0c0f14;
  --s2: #111620;
  --s3: #171e2a;
  --border: #1d2535;
  --border2: #243040;
  --green: #00e5a0;
  --green-dim: rgba(0,229,160,0.12);
  --green-glow: rgba(0,229,160,0.06);
  --blue: #3d8ef8;
  --blue-dim: rgba(61,142,248,0.12);
  --yellow: #f5a623;
  --yellow-dim: rgba(245,166,35,0.12);
  --red: #ff4d6a;
  --red-dim: rgba(255,77,106,0.1);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.1);
  --text: #dce8f5;
  --text2: #8a9bb5;
  --text3: #4a5a70;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Inter', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{
  height:52px;min-height:52px;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 20px;gap:16px;
  z-index:100;
}
.logo{
  font-family:var(--mono);font-size:13px;font-weight:700;
  color:var(--green);letter-spacing:.06em;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.top-search{
  flex:1;max-width:500px;
  display:flex;align-items:center;gap:0;
  background:var(--s2);border:1px solid var(--border2);border-radius:8px;overflow:hidden;
}
.top-search input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--sans);font-size:13px;
  padding:9px 14px;
}
.top-search input::placeholder{color:var(--text3)}
.top-search button{
  background:var(--green);border:none;color:#000;
  font-family:var(--mono);font-size:11px;font-weight:700;
  padding:9px 16px;cursor:pointer;letter-spacing:.05em;
  transition:opacity .15s;flex-shrink:0;
}
.top-search button:hover{opacity:.85}

.top-filters{
  display:flex;gap:8px;align-items:center;margin-left:auto;flex-shrink:0;
}
.filter-sel{
  background:var(--s2);border:1px solid var(--border2);
  color:var(--text2);font-family:var(--mono);font-size:11px;
  padding:6px 10px;border-radius:6px;outline:none;cursor:pointer;
  appearance:none;-webkit-appearance:none;
}
.filter-sel:focus{border-color:var(--blue)}
.cfg-btn{
  background:var(--s2);border:1px solid var(--border2);
  color:var(--text2);font-family:var(--mono);font-size:11px;
  padding:6px 12px;border-radius:6px;cursor:pointer;
  transition:all .15s;flex-shrink:0;
}
.cfg-btn:hover{border-color:var(--green);color:var(--green)}
.token-badge{
  font-family:var(--mono);font-size:10px;padding:4px 10px;
  border-radius:20px;flex-shrink:0;letter-spacing:.04em;
}
.token-badge.ok{background:var(--green-dim);border:1px solid rgba(0,229,160,.25);color:var(--green)}
.token-badge.err{background:var(--red-dim);border:1px solid rgba(255,77,106,.25);color:var(--red)}
.token-badge.checking{background:rgba(90,112,128,.12);border:1px solid var(--border2);color:var(--text3)}

/* ── LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:230px;min-width:230px;
  background:var(--s1);border-right:1px solid var(--border);
  overflow-y:auto;padding:12px 0;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.cat-label{
  font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:.14em;color:var(--text3);text-transform:uppercase;
  padding:12px 16px 6px;
}
.vertical-btn{
  width:100%;background:transparent;border:none;
  text-align:left;cursor:pointer;
  padding:7px 16px;
  display:flex;align-items:center;gap:10px;
  color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;
  transition:all .12s;border-left:2px solid transparent;
}
.vertical-btn:hover{background:var(--s2);color:var(--text);border-left-color:var(--border2)}
.vertical-btn.active{background:var(--green-glow);color:var(--green);border-left-color:var(--green)}
.vertical-btn .vicon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.vertical-btn .vname{flex:1}
.vertical-btn .vtag{
  font-family:var(--mono);font-size:9px;
  background:var(--blue-dim);border:1px solid rgba(61,142,248,.2);
  color:var(--blue);padding:1px 6px;border-radius:3px;flex-shrink:0;
}
.vertical-btn.active .vtag{background:var(--green-dim);border-color:rgba(0,229,160,.25);color:var(--green)}

.sidebar-divider{height:1px;background:var(--border);margin:8px 0}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── RESULTS HEADER ── */
.results-header{
  padding:14px 20px;
  background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;flex-shrink:0;
}
.rh-title{font-size:14px;font-weight:700;color:var(--text)}
.rh-sub{font-family:var(--mono);font-size:11px;color:var(--text3)}
.rh-stats{display:flex;gap:12px;margin-left:auto}
.rh-stat{
  font-family:var(--mono);font-size:11px;
  display:flex;align-items:center;gap:5px;
}
.rh-stat .val{color:var(--green);font-weight:700}
.rh-stat .lbl{color:var(--text3)}
.sort-sel{
  background:var(--s2);border:1px solid var(--border2);
  color:var(--text2);font-family:var(--mono);font-size:10px;
  padding:5px 8px;border-radius:5px;outline:none;cursor:pointer;
  appearance:none;
}

/* ── AD GRID ── */
.grid-wrap{flex:1;overflow-y:auto;padding:16px 20px}
.grid-wrap::-webkit-scrollbar{width:5px}
.grid-wrap::-webkit-scrollbar-track{background:transparent}
.grid-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.ad-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:14px;
}

/* ── AD CARD ── */
.ad-card{
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;transition:border-color .18s,box-shadow .18s;
  animation:cardIn .25s ease both;display:flex;flex-direction:column;
}
.ad-card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.3)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* card head */
.card-head{
  padding:12px 14px 10px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  border-bottom:1px solid var(--border);
}
.page-info{flex:1;min-width:0}
.page-name{
  font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.page-id{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:2px}
.card-platforms{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.plat{
  font-family:var(--mono);font-size:8px;letter-spacing:.04em;
  padding:2px 6px;border-radius:3px;text-transform:uppercase;
}
.plat.fb{background:rgba(24,119,242,.15);border:1px solid rgba(24,119,242,.3);color:#4d94ff}
.plat.ig{background:rgba(193,53,132,.12);border:1px solid rgba(193,53,132,.25);color:#e1699a}
.plat.an{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);color:var(--yellow)}
.plat.ms{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);color:var(--purple)}

/* creative */
.card-creative{
  position:relative;background:var(--s2);
  display:none;border-bottom:1px solid var(--border);
}
.card-creative.visible{display:block}
.card-creative img{width:100%;max-height:220px;object-fit:cover;display:block}
.card-creative video{width:100%;max-height:220px;object-fit:cover;display:block}
.creative-iframe{width:100%;height:220px;border:none;display:block;background:#fff}
.creative-overlay{
  position:absolute;top:8px;right:8px;display:flex;gap:5px;
}
.c-btn{
  background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.15);
  color:#fff;border-radius:5px;padding:4px 8px;
  font-family:var(--mono);font-size:9px;cursor:pointer;
  text-decoration:none;transition:all .12s;display:flex;align-items:center;gap:3px;
}
.c-btn:hover{background:var(--green-dim);color:var(--green);border-color:rgba(0,229,160,.3)}

/* card body */
.card-body{padding:12px 14px;flex:1}

.ad-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4}
.ad-body{
  font-size:11px;color:var(--text2);line-height:1.6;
  max-height:72px;overflow:hidden;position:relative;
  margin-bottom:8px;
}
.ad-body.exp{max-height:none}
.expand-txt{
  background:none;border:none;color:var(--blue);
  font-family:var(--mono);font-size:9px;cursor:pointer;
  padding:0;margin-bottom:10px;display:block;
}

/* domain row */
.domain-row{
  display:flex;align-items:center;gap:6px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:5px;padding:5px 9px;margin-bottom:8px;
}
.domain-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);flex-shrink:0}
.domain-val{font-family:var(--mono);font-size:10px;color:var(--blue);font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.full-url-val{font-family:var(--mono);font-size:8px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{
  font-family:var(--mono);font-size:9px;
  padding:2px 7px;border-radius:4px;
  display:flex;align-items:center;gap:3px;
}
.chip.spend{background:var(--yellow-dim);border:1px solid rgba(245,166,35,.25);color:var(--yellow)}
.chip.imp{background:var(--green-dim);border:1px solid rgba(0,229,160,.2);color:var(--green)}
.chip.date{background:rgba(90,112,128,.1);border:1px solid var(--border2);color:var(--text3)}
.chip.active{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);color:var(--green)}
.chip.inactive{background:var(--red-dim);border:1px solid rgba(255,77,106,.2);color:var(--red)}

/* card footer */
.card-foot{
  padding:9px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
}
.foot-btn{
  font-family:var(--mono);font-size:9px;letter-spacing:.04em;
  padding:5px 10px;border-radius:5px;cursor:pointer;
  transition:all .12s;display:flex;align-items:center;gap:4px;
  border:1px solid var(--border2);background:transparent;color:var(--text2);
  text-decoration:none;
}
.foot-btn:hover{border-color:var(--blue);color:var(--blue)}
.foot-btn.green:hover{border-color:var(--green);color:var(--green)}
.foot-btn.ml{margin-left:auto}

/* ── EMPTY / LOADING / ERROR ── */
.state-wrap{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 40px;gap:14px;
  text-align:center;
}
.state-icon{font-size:42px;opacity:.25}
.state-title{font-size:15px;font-weight:600;color:var(--text2)}
.state-sub{font-family:var(--mono);font-size:11px;color:var(--text3);line-height:1.7}
.spinner{
  width:36px;height:36px;border:3px solid var(--border2);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-kw{font-family:var(--mono);font-size:12px;color:var(--text3)}

.err-box{
  grid-column:1/-1;
  background:var(--red-dim);border:1px solid rgba(255,77,106,.3);
  color:var(--red);padding:14px 18px;border-radius:8px;
  font-family:var(--mono);font-size:11px;line-height:1.7;
}

/* ── PAGINATION ── */
.pagination{
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:16px 0;border-top:1px solid var(--border);
  margin-top:8px;
}
.pg-btn{
  background:var(--s1);border:1px solid var(--border2);
  color:var(--text2);font-family:var(--mono);font-size:10px;
  padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .12s;
}
.pg-btn:hover:not(:disabled){border-color:var(--green);color:var(--green)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
.pg-info{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:200;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
.modal{
  background:var(--s2);border:1px solid var(--border2);
  border-radius:14px;padding:28px;width:460px;max-width:95vw;
  box-shadow:0 24px 60px rgba(0,0,0,.5);
}
.modal h3{font-family:var(--mono);font-size:13px;color:var(--green);letter-spacing:.08em;margin-bottom:20px}
.f-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:6px;margin-top:14px}
.f-input{
  width:100%;background:var(--s1);border:1px solid var(--border2);
  border-radius:7px;padding:9px 13px;color:var(--text);
  font-family:var(--mono);font-size:11px;outline:none;
}
.f-input:focus{border-color:var(--green)}
.f-note{
  font-family:var(--mono);font-size:9px;color:var(--text3);
  line-height:1.7;margin-top:8px;padding:9px 11px;
  background:var(--s1);border-radius:5px;
  border-left:2px solid var(--blue);
}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:22px}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:7px;padding:8px 16px;font-family:var(--mono);font-size:10px;cursor:pointer}
.btn-save{background:var(--green);border:none;color:#000;border-radius:7px;padding:8px 16px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>ADSPY</div>

  <div class="top-search">
    <input type="text" id="searchInput" placeholder="Search any pay-per-call keyword..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">SEARCH</button>
  </div>

  <div class="top-filters">
    <select class="filter-sel" id="fCountry">
      <option value="US">🇺🇸 US</option>
      <option value="GB">🇬🇧 UK</option>
      <option value="CA">🇨🇦 Canada</option>
      <option value="AU">🇦🇺 Australia</option>
    </select>
    <select class="filter-sel" id="fLimit">
      <option value="24">24 ads</option>
      <option value="48">48 ads</option>
      <option value="96">96 ads</option>
    </select>
    <span class="token-badge checking" id="tokenBadge">● CHECKING...</span>
    <button class="cfg-btn" onclick="openCfg()">⚙ CONFIG</button>
  </div>
</div>

<!-- BODY -->
<div class="body">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <!-- built by JS -->
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="results-header" id="resultsHeader" style="display:none">
      <div>
        <div class="rh-title" id="rhTitle">—</div>
        <div class="rh-sub" id="rhSub"></div>
      </div>
      <div class="rh-stats">
        <div class="rh-stat"><span class="val" id="rhCount">0</span><span class="lbl">ads</span></div>
        <div class="rh-stat"><span class="val" id="rhPages">0</span><span class="lbl">advertisers</span></div>
      </div>
      <select class="sort-sel" id="sortSel" onchange="reSort()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="spend_high">Highest spend</option>
      </select>
    </div>

    <div class="grid-wrap">
      <div class="ad-grid" id="adGrid">
        <div class="state-wrap">
          <div class="state-icon">🕵️</div>
          <div class="state-title">Pay-Per-Call Ad Intelligence</div>
          <div class="state-sub">Select a vertical from the sidebar<br>or type any keyword to start spying.</div>
        </div>
      </div>
      <div class="pagination hidden" id="pagination">
        <button class="pg-btn" id="pgPrev" onclick="goPage('prev')" disabled>← PREV</button>
        <span class="pg-info" id="pgInfo">Page 1</span>
        <button class="pg-btn" id="pgNext" onclick="goPage('next')">NEXT →</button>
      </div>
    </div>
  </div>
</div>

<!-- CONFIG MODAL -->
<div class="modal-bg hidden" id="cfgModal">
  <div class="modal">
    <h3>// CONFIGURATION</h3>
    <div class="f-label">Facebook Ad Library Access Token</div>
    <input type="text" class="f-input" id="cfgToken" placeholder="EAAJse...">
    <div class="f-note">
      Requires <strong>ads_read</strong> permission.<br>
      Get from: developers.facebook.com → Tools → Graph API Explorer
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeCfg()">CANCEL</button>
      <button class="btn-save" onclick="saveCfg()">SAVE & VERIFY</button>
    </div>
  </div>
</div>

<script>

    { name:"Tax Relief",        icon:"📋",  keys:["tax relief service","IRS tax debt","back taxes help","tax settlement"] },
    { name:"Credit Repair",     icon:"📈",  keys:["credit repair service","fix my credit","improve credit score"] },
    { name:"Mortgage",          icon:"🏦",  keys:["mortgage rates","home loan","mortgage broker","buy a home loan"] },
    { name:"Refinance",         icon:"💰",  keys:["refinance mortgage","lower mortgage rate","refinance home loan"] },
    { name:"Personal Loans",    icon:"💵",  keys:["personal loan","fast cash loan","get a loan today","online loan"] },
  ],
  "Insurance": [
    { name:"Auto Insurance",    icon:"🚘",  keys:["auto insurance quote","car insurance rate","cheap car insurance"] },
    { name:"Home Insurance",    icon:"🏡",  keys:["homeowners insurance","home insurance quote","house insurance"] },
    { name:"Life Insurance",    icon:"❤️",  keys:["life insurance quote","term life insurance","life insurance rates"] },
    { name:"Health Insurance",  icon:"🏥",  keys:["health insurance plans","affordable health insurance","health coverage"] },
    { name:"Medicare",          icon:"💊",  keys:["Medicare plans","Medicare supplement","Medicare Advantage","Medicare enrollment"] },
    { name:"Final Expense",     icon:"🕊️",  keys:["final expense insurance","burial insurance","funeral insurance"] },
  ],
  "Legal & Medical": [
    { name:"Personal Injury",   icon:"⚖️",  keys:["personal injury lawyer","accident attorney","injury claim","car accident lawyer"] },
    { name:"Drug Rehab",        icon:"🩺",  keys:["drug rehab center","addiction treatment","alcohol rehab","substance abuse help"] },
    { name:"Senior Care",       icon:"👴",  keys:["senior care services","assisted living","home health care","elder care"] },

  ],
};

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const FB_API = 'https://graph.facebook.com/v21.0/ads_archive';
const FIELDS = [
  'id','ad_creation_time','ad_delivery_start_time','ad_delivery_stop_time',
  'ad_creative_bodies','ad_creative_link_captions','ad_creative_link_descriptions',
  'ad_creative_link_titles','ad_snapshot_url','currency',
  'impressions','page_id','page_name','publisher_platforms','spend',
  'ad_creative_images','ad_creative_videos'
].join(',');

let TOKEN = localStorage.getItem('fb_adspy_token') || 'EAAJseJzwrbkBRLkMrt0nmZCZAasI8PSJxa2hy3IvE0F5L8fJf8IazRtKh1aiFGWP9ugTH9P8ZCNZAEBrHrqlRdqmxkC0H0Y9a7rJ4piNvbQb8gHE3n2BVZC041o8qewtuaJfSZAdCVIcZAFx27ZCADGGwnTs0MRjSK7udcriMJqZB5TEmBGz7eVllYAPbkwv3S3WgUdlZBV6aSbcMyGtDT2yfzNK5tZBMacP4WOMUeGAIsjOjhzJpDcWrIx';
let allAds = [];
let afterCursors = [];
let currentCursor = null;
let currentPage = 1;
let currentKeyword = null;
let currentLabel = null;
let activeVertical = null;
let isLoading = false;

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
window.onload = () => {
  buildSidebar();
  verifyToken();
};

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  Object.entries(VERTICALS).forEach(([cat, items]) => {
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.textContent = cat;
    sb.appendChild(lbl);

    items.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'vertical-btn';
      btn.id = 'v_' + v.name.replace(/\s+/g,'_');
      btn.innerHTML = `<span class="vicon">${v.icon}</span><span class="vname">${v.name}</span>`;
      btn.onclick = () => selectVertical(v);
      sb.appendChild(btn);
    });

    const div = document.createElement('div');
    div.className = 'sidebar-divider';
    sb.appendChild(div);
  });
}

function selectVertical(v) {
  // clear active
  document.querySelectorAll('.vertical-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('v_' + v.name.replace(/\s+/g,'_'));
  if (btn) btn.classList.add('active');

  activeVertical = v;
  document.getElementById('searchInput').value = v.keys[0];
  resetPages();
  fetchAds(v.keys[0], v.name);
}

// ═══════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════
function doSearch() {
  const kw = document.getElementById('searchInput').value.trim();
  if (!kw) return;
  document.querySelectorAll('.vertical-btn').forEach(b => b.classList.remove('active'));
  activeVertical = null;
  resetPages();
  fetchAds(kw, kw);
}

function resetPages() {
  afterCursors = [];
  currentCursor = null;
  currentPage = 1;
  allAds = [];
}

async function fetchAds(keyword, label, after = null) {
  if (isLoading) return;
  if (!TOKEN) { openCfg(); return; }
  isLoading = true;
  currentKeyword = keyword;
  currentLabel = label;

  showLoading(keyword);

  const country = document.getElementById('fCountry').value;
  const limit = document.getElementById('fLimit').value;

  const params = new URLSearchParams({
    access_token: TOKEN,
    ad_type: 'ALL',
    ad_reached_countries: JSON.stringify([country]),
    search_terms: keyword,
    fields: FIELDS,
    limit: limit,
  });
  if (after) params.append('after', after);

  try {
    const res = await fetch(`${FB_API}?${params}`);
    const data = await res.json();

    if (data.error) {
      showErr(data.error.message);
      return;
    }

    allAds = data.data || [];
    currentCursor = data.paging?.cursors?.after || null;

    renderAds(allAds, label, keyword, country);
    updatePagination();

  } catch(e) {
    showErr('Network error: ' + e.message);
  } finally {
    isLoading = false;
  }
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function renderAds(ads, label, kw, country) {
  const grid = document.getElementById('adGrid');
  const rh = document.getElementById('resultsHeader');
  rh.style.display = 'flex';

  document.getElementById('rhTitle').textContent = label;
  document.getElementById('rhSub').textContent = `"${kw}" · ${country} · Page ${currentPage}`;
  document.getElementById('rhCount').textContent = ads.length;
  document.getElementById('rhPages').textContent = new Set(ads.map(a=>a.page_id)).size;

  grid.innerHTML = '';

  if (!ads.length) {
    grid.innerHTML = `<div class="state-wrap">
      <div class="state-icon">📭</div>
      <div class="state-title">No ads found</div>
      <div class="state-sub">Try a different keyword or country filter.</div>
    </div>`;
    return;
  }

  sortedAds(ads).forEach((ad, i) => {
    const card = makeCard(ad, i);
    grid.appendChild(card);
  });
}

function sortedAds(ads) {
  const s = document.getElementById('sortSel').value;
  return [...ads].sort((a,b) => {
    if (s === 'newest') return new Date(b.ad_creation_time||0) - new Date(a.ad_creation_time||0);
    if (s === 'oldest') return new Date(a.ad_creation_time||0) - new Date(b.ad_creation_time||0);
    if (s === 'spend_high') {
      const sa = parseInt(a.spend?.upper_bound||0);
      const sb = parseInt(b.spend?.upper_bound||0);
      return sb - sa;
    }
    return 0;
  });
}

function reSort() {
  if (allAds.length) renderAds(allAds, currentLabel, currentKeyword, document.getElementById('fCountry').value);
}

function makeCard(ad, i) {
  const card = document.createElement('div');
  card.className = 'ad-card';
  card.style.animationDelay = `${i * 0.03}s`;

  // platforms
  const platMap = {facebook:'fb',instagram:'ig',audience_network:'an',messenger:'ms'};
  const plats = (ad.publisher_platforms||[]).map(p =>
    `<span class="plat ${platMap[p]||''}">${p==='audience_network'?'AN':p==='messenger'?'MSG':p.charAt(0).toUpperCase()+p.slice(1)}</span>`
  ).join('');

  // text
  const title = (ad.ad_creative_link_titles||[])[0] || '';
  const body  = (ad.ad_creative_bodies||[])[0] || '';
  const desc  = (ad.ad_creative_link_descriptions||[])[0] || '';
  const domain= (ad.ad_creative_link_captions||[])[0] || '';

  // spend / impressions
  const spMin = ad.spend?.lower_bound;
  const spMax = ad.spend?.upper_bound;
  const imMin = ad.impressions?.lower_bound;
  const imMax = ad.impressions?.upper_bound;

  const spendChip = spMin!=null
    ? `<span class="chip spend">💵 $${fmtN(spMin)}–$${fmtN(spMax||spMin)}</span>` : '';
  const impChip = imMin!=null
    ? `<span class="chip imp">👁 ${fmtN(imMin)}–${fmtN(imMax||imMin)}</span>` : '';
  const dateChip = ad.ad_creation_time
    ? `<span class="chip date">📅 ${fmtDate(ad.ad_creation_time)}</span>` : '';
  const activeChip = ad.ad_delivery_stop_time
    ? `<span class="chip inactive">● STOPPED ${fmtDate(ad.ad_delivery_stop_time)}</span>`
    : `<span class="chip active">● ACTIVE</span>`;

  // domain row
  const domainRow = domain
    ? `<div class="domain-row">
        <span class="domain-lbl">DOMAIN</span>
        <span class="domain-val">${esc(domain)}</span>
       </div>` : '';

  // creative
  const { html: creativeHtml, hasMedia, dlUrl, dlType } = getCreative(ad);

  const dlBtn = hasMedia && dlType === 'image'
    ? `<a class="c-btn" href="${dlUrl}" download target="_blank">⬇ IMG</a>`
    : hasMedia && dlType === 'video'
    ? `<a class="c-btn" href="${dlUrl}" target="_blank">▶ VID</a>` : '';

  const creativeBlock = `
    <div class="card-creative" id="cr_${ad.id}">
      ${creativeHtml}
      <div class="creative-overlay">${dlBtn}</div>
    </div>`;

  card.innerHTML = `
    <div class="card-head">
      <div class="page-info">
        <div class="page-name" title="${esc(ad.page_name||'')}">${esc(ad.page_name||'Unknown Page')}</div>
        <div class="page-id">Page ID: ${ad.page_id||'—'}</div>
      </div>
      <div class="card-platforms">${plats}</div>
    </div>

    ${creativeBlock}

    <div class="card-body">
      ${title ? `<div class="ad-title">${esc(title)}</div>` : ''}
      ${body  ? `<div class="ad-body" id="ab_${ad.id}">${esc(body)}</div>
                 <button class="expand-txt" onclick="expText('${ad.id}')">▼ show more</button>` : ''}
      ${desc  ? `<div style="font-size:10px;color:var(--text3);margin-bottom:8px;font-style:italic">${esc(desc)}</div>` : ''}
      ${!title && !body ? `<div style="font-size:11px;color:var(--text3);margin-bottom:8px;opacity:.5">No ad copy available</div>` : ''}

      ${domainRow}

      <div class="chips">
        ${activeChip}
        ${spendChip}
        ${impChip}
        ${dateChip}
      </div>
    </div>

    <div class="card-foot">
      ${creativeHtml ? `<button class="foot-btn green" onclick="toggleCreative('${ad.id}')">👁 PREVIEW</button>` : ''}
      <a class="foot-btn ${creativeHtml?'':'ml'}" href="${ad.ad_snapshot_url||'#'}" target="_blank" rel="noopener">🔗 SNAPSHOT</a>
      <a class="foot-btn ml" href="https://www.facebook.com/${ad.page_id}" target="_blank" rel="noopener">📄 PAGE</a>
    </div>`;

  return card;
}

function getCreative(ad) {
  const imgs = ad.ad_creative_images;
  if (imgs && imgs.length) {
    const src = imgs[0].original_image_url || imgs[0].url || '';
    if (src) return {
      html: `<img src="${src}" alt="creative" loading="lazy" onerror="this.parentElement.style.display='none'">`,
      hasMedia: true, dlUrl: src, dlType: 'image'
    };
  }
  const vids = ad.ad_creative_videos;
  if (vids && vids.length) {
    const src = vids[0].video_hd_url || vids[0].video_sd_url || '';
    const poster = vids[0].video_preview_image_url || '';
    if (src) return {
      html: `<video src="${src}" controls playsinline preload="none" poster="${poster}"></video>`,
      hasMedia: true, dlUrl: src, dlType: 'video'
    };
  }
  if (ad.ad_snapshot_url) return {
    html: `<iframe class="creative-iframe" src="${ad.ad_snapshot_url}" loading="lazy" sandbox="allow-scripts allow-same-origin"></iframe>`,
    hasMedia: true, dlUrl: ad.ad_snapshot_url, dlType: 'snapshot'
  };
  return { html:'', hasMedia:false, dlUrl:'', dlType:'' };
}

// ═══════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════
function toggleCreative(id) {
  const el = document.getElementById('cr_' + id);
  if (el) el.classList.toggle('visible');
}
function expText(id) {
  const el = document.getElementById('ab_' + id);
  const btn = el?.nextElementSibling;
  if (!el) return;
  const exp = el.classList.toggle('exp');
  if (btn) btn.textContent = exp ? '▲ show less' : '▼ show more';
}

function showLoading(kw) {
  document.getElementById('adGrid').innerHTML = `
    <div class="state-wrap">
      <div class="spinner"></div>
      <div class="loading-kw">Scanning: "${kw}"...</div>
    </div>`;
  document.getElementById('pagination').classList.add('hidden');
  document.getElementById('resultsHeader').style.display = 'none';
}

function showErr(msg) {
  isLoading = false;
  document.getElementById('adGrid').innerHTML = `
    <div class="err-box">⚠ API ERROR: ${esc(msg)}<br>
    <small>Check your access token in CONFIG settings.</small></div>`;
}

// ═══════════════════════════════════════════════════════
//  PAGINATION
// ═══════════════════════════════════════════════════════
function goPage(dir) {
  if (!currentKeyword) return;
  if (dir === 'next' && currentCursor) {
    afterCursors.push(currentCursor);
    currentPage++;
    fetchAds(currentKeyword, currentLabel, currentCursor);
  } else if (dir === 'prev' && currentPage > 1) {
    afterCursors.pop();
    currentPage--;
    const cur = afterCursors.length ? afterCursors[afterCursors.length-1] : null;
    fetchAds(currentKeyword, currentLabel, cur);
  }
}
function updatePagination() {
  const pag = document.getElementById('pagination');
  pag.classList.remove('hidden');
  document.getElementById('pgInfo').textContent = `Page ${currentPage}`;
  document.getElementById('pgPrev').disabled = currentPage <= 1;
  document.getElementById('pgNext').disabled = !currentCursor;
}

// ═══════════════════════════════════════════════════════
//  TOKEN
// ═══════════════════════════════════════════════════════
function verifyToken() {
  const badge = document.getElementById('tokenBadge');
  badge.className = 'token-badge checking';
  badge.textContent = '● CHECKING...';
  if (!TOKEN) { badge.className='token-badge err'; badge.textContent='● NO TOKEN'; return; }
  fetch(`https://graph.facebook.com/v21.0/me?access_token=${TOKEN}`)
    .then(r=>r.json())
    .then(d => {
      if (d.error) { badge.className='token-badge err'; badge.textContent='● INVALID TOKEN'; }
      else { badge.className='token-badge ok'; badge.textContent='● TOKEN OK'; }
    })
    .catch(() => { badge.className='token-badge err'; badge.textContent='● CHECK FAILED'; });
}

// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
function openCfg() { document.getElementById('cfgToken').value=TOKEN||''; document.getElementById('cfgModal').classList.remove('hidden'); }
function closeCfg() { document.getElementById('cfgModal').classList.add('hidden'); }
function saveCfg() {
  const t = document.getElementById('cfgToken').value.trim();
  if (t) { TOKEN=t; localStorage.setItem('fb_adspy_token',t); }
  closeCfg(); verifyToken();
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s){ return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtN(n){
  const x=parseInt(n||0);
  if(x>=1000000) return (x/1000000).toFixed(1)+'M';
  if(x>=1000) return (x/1000).toFixed(0)+'K';
  return x.toString();
}
